server:
  port: 8080

spring:
  application:
    name: hostel-mess-management

  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

# Application Configuration
app:
  meal:
    cost: 60.0
    fine-per-day: 30.0
    payment-grace-days: 7

